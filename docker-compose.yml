services:
  db:
    image: mysql:8.0
    container_name: projet_db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: always
    environment:
      MYSQL_DATABASE: iran_news
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_projet
      MYSQL_PASSWORD: password_projet
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: projet_web
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: iran_news
      DB_USER: user_projet
      DB_PASSWORD: password_projet
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
